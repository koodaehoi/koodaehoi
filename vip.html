<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>구대회커피 | MOCAFF VVIP 시음권</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; background: #080808; color: #fff; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; box-sizing: border-box; min-height: 100vh; }
        
        /* 로고 및 헤더 */
        .logo { font-size: 1.5rem; letter-spacing: 5px; color: #d4af37; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .sub-text { font-size: 0.85rem; color: #888; margin-bottom: 40px; }

        /* 1. 잠금 화면 (17시 이전) */
        #locked-screen { text-align: center; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.2); padding: 40px 20px; border-radius: 15px; width: 100%; max-width: 400px; }
        .lock-icon { font-size: 3rem; margin-bottom: 15px; }
        .lock-title { color: #d4af37; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .lock-desc { color: #ccc; font-size: 0.9rem; line-height: 1.5; word-break: keep-all; }

        /* 2. 해제 화면 (17시 이후 NFT 및 소각 버튼) */
        #unlocked-screen { display: none; width: 100%; max-width: 400px; text-align: center; }
        .nft-container { position: relative; width: 100%; margin-bottom: 25px; }
        .nft-img { width: 100%; border-radius: 15px; border: 2px solid #d4af37; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
        
        /* 소각(사용) 완료 도장 */
        .used-stamp { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); font-size: 3.5rem; color: #ff3b30; border: 6px solid #ff3b30; padding: 10px 20px; font-weight: 900; background: rgba(0,0,0,0.7); border-radius: 15px; z-index: 10; letter-spacing: 3px; }

        /* 아메리카노 시음 버튼 */
        .action-btn { width: 100%; padding: 18px; background: #d4af37; border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-bottom: 15px; }
        .action-btn:hover { background: #b8962e; }
        .action-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        
        .footer { margin-top: 50px; font-size: 0.75rem; color: #444; text-align: center; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="logo">KOODAEHOI COFFEE</div>
        <div class="sub-text">MOCAFF RWA Collaboration</div>

        <div id="locked-screen">
            <div class="lock-icon">🔒</div>
            <div class="lock-title">보안 접근 대기 중</div>
            <div class="lock-desc">
                본 VVIP 시음권역은<br>
                <strong>2026년 3월 25일 17:00</strong>에 잠금 해제됩니다.<br><br>
                음악회 현장에서 다시 QR을 스캔해 주십시오.
            </div>
        </div>

        <div id="unlocked-screen">
            <h2 style="color:#d4af37; font-size: 1.3rem; margin-bottom: 20px;">한정판 RWA 시음권</h2>
            
            <div class="nft-container">
                <div class="used-stamp" id="used-stamp">시음 완료</div>
                <img src="https://mocaff.kr/nft_badge.jpg" alt="MOCAFF NFT" class="nft-img" onerror="this.src='https://via.placeholder.com/400x400/111/d4af37?text=MOCAFF+NFT'">
            </div>

            <p id="status-msg" style="color: #ccc; font-size: 0.9rem; margin-bottom: 20px; word-break: keep-all;">
                바리스타에게 이 화면을 보여주시고<br>아래 버튼을 눌러 시음을 시작하십시오.
            </p>

            <button id="burn-btn" class="action-btn" onclick="executeBurn()">☕ 아메리카노 한 잔 시음</button>
        </div>

        <div class="footer">© 2026 구대회커피 & MOCAFF. All rights reserved.</div>
    </div>

    <script>
        // --- [작전 설정값] ---
        // 타임 락 해제 시간 (2026년 3월 25일 17시 00분 00초)
        const unlockDate = new Date("March 25, 2026 17:00:00").getTime();
        // 스태프 확인용 암호
        const adminCode = "0426"; 

        const lockedScreen = document.getElementById('locked-screen');
        const unlockedScreen = document.getElementById('unlocked-screen');
        const burnBtn = document.getElementById('burn-btn');
        const usedStamp = document.getElementById('used-stamp');
        const statusMsg = document.getElementById('status-msg');

        // --- [상태 복구 및 시간 체크] ---
        window.onload = function() {
            checkTimeLock();
            // 1초마다 시간 체크 (기다리던 손님 화면이 17시 정각에 자동 전환됨)
            setInterval(checkTimeLock, 1000);
        };

        function checkTimeLock() {
            const now = new Date().getTime();
            
            if (now >= unlockDate) {
                // 17시가 지났으면 잠금 해제
                lockedScreen.style.display = 'none';
                unlockedScreen.style.display = 'block';
                
                // 이미 커피를 마신 사람인지 로컬 저장소 확인
                if (localStorage.getItem('koodaehoi_coffee_burned') === 'true') {
                    showBurnedState();
                }
            } else {
                // 17시 이전이면 잠금 화면 유지
                lockedScreen.style.display = 'block';
                unlockedScreen.style.display = 'none';
            }
        }

        // --- [소각 실행 로직 (스태프 확인)] ---
        function executeBurn() {
            // 1. 손님이 버튼을 누르면 스태프 암호를 요구함
            const inputCode = prompt("바리스타 확인 코드를 입력해 주십시오.");
            
            if (inputCode === adminCode) {
                // 2. 암호가 맞으면 최종 확인
                if(confirm("확인을 누르시면 시음권이 사용 처리(소각)됩니다.\n커피를 제공하시겠습니까?")) {
                    // 사용 기록 저장
                    localStorage.setItem('koodaehoi_coffee_burned', 'true');
                    showBurnedState();
                    alert("✅ 성공적으로 처리되었습니다. 아메리카노를 서빙해 주십시오.");
                }
            } else if (inputCode !== null) {
                alert("❌ 코드가 올바르지 않습니다.");
            }
        }

        // --- [소각 완료 후 화면 변화] ---
        function showBurnedState() {
            usedStamp.style.display = 'block';
            burnBtn.disabled = true;
            burnBtn.innerText = "사용이 완료된 시음권입니다";
            burnBtn.style.background = "#333";
            burnBtn.style.color = "#888";
            statusMsg.innerText = "이미 시음 혜택을 받으셨습니다. 감사합니다.";
            statusMsg.style.color = "#ff3b30";
        }
    </script>
</body>
</html>
