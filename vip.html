        .wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; box-sizing: border-box; min-height: 100vh; }
        
        /* 로고 및 헤더 */
        .logo { font-size: 1.5rem; letter-spacing: 5px; color: #d4af37; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .sub-text { font-size: 0.85rem; color: #888; margin-bottom: 40px; }

        /* 1. 잠금 화면 (17시 이전) */
        #locked-screen { text-align: center; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.2); padding: 40px 20px; border-radius: 15px; width: 100%; max-width: 400px; }
        .lock-icon { font-size: 3rem; margin-bottom: 15px; }
        .lock-title { color: #d4af37; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .lock-desc { color: #ccc; font-size: 0.9rem; line-height: 1.5; word-break: keep-all; }

        /* 2. 해제 화면 (17시 이후 NFT 및 소각 버튼) */
        #unlocked-screen { display: none; width: 100%; max-width: 400px; text-align: center; }
        .nft-container { position: relative; width: 100%; margin-bottom: 25px; }
        .nft-img { width: 100%; border-radius: 15px; border: 2px solid #d4af37; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
        
        /* 소각(사용) 완료 도장 */
        .used-stamp { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); font-size: 3.5rem; color: #ff3b30; border: 6px solid #ff3b30; padding: 10px 20px; font-weight: 900; background: rgba(0,0,0,0.7); border-radius: 15px; z-index: 10; letter-spacing: 3px; }

        /* 아메리카노 시음 버튼 */
        .action-btn { width: 100%; padding: 18px; background: #d4af37; border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-bottom: 15px; }
        .action-btn:hover { background: #b8962e; }
        .action-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        
        .footer { margin-top: 50px; font-size: 0.75rem; color: #444; text-align: center; }
    </style>
</head>
